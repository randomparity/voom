{% extends "base.html" %}

{% block title %}Plugins — VOOM{% endblock %}

{% block content %}
<div class="page-header">
    <h1>Plugins</h1>
    <p>Loaded native and WASM plugins</p>
</div>

<div class="card"
     x-data="{ plugins: [], loading: true }"
     x-init="fetch('/api/plugins').then(r => r.json()).then(d => { plugins = d.plugins || []; loading = false; }).catch(() => { loading = false; })">

    <template x-if="loading">
        <div class="empty-state">
            <p>Loading plugins...</p>
        </div>
    </template>

    <template x-if="!loading && plugins.length === 0">
        <div class="empty-state">
            <p>No plugins loaded.</p>
        </div>
    </template>

    <template x-if="!loading && plugins.length > 0">
        <table>
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Version</th>
                    <th>Description</th>
                    <th>Type</th>
                    <th>Capabilities</th>
                </tr>
            </thead>
            <tbody>
                <template x-for="plugin in plugins" :key="plugin.name">
                    <tr>
                        <td style="font-weight: 500;">
                            <span x-text="plugin.name"></span>
                            <template x-if="plugin.license">
                                <span class="badge" style="margin-left: 0.25rem; font-size: 0.75em;"
                                      x-text="plugin.license"></span>
                            </template>
                        </td>
                        <td class="mono" x-text="plugin.version || '--'"></td>
                        <td x-text="plugin.description || ''"></td>
                        <td>
                            <span class="badge"
                                  :class="plugin.plugin_type === 'wasm' ? 'badge-info' : 'badge-success'"
                                  x-text="plugin.plugin_type || 'native'"></span>
                        </td>
                        <td>
                            <template x-for="cap in (plugin.capabilities || [])" :key="cap">
                                <span class="badge badge-info" x-text="cap"
                                      style="margin-right: 0.25rem; margin-bottom: 0.15rem;"></span>
                            </template>
                        </td>
                    </tr>
                </template>
            </tbody>
        </table>
    </template>
</div>
{% endblock %}
