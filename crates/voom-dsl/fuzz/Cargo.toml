[package]
name = "voom-dsl-fuzz"
version = "0.0.0"
publish = false
edition = "2024"

[package.metadata]
cargo-fuzz = true

[dependencies]
libfuzzer-sys = "0.4"
voom-dsl = { path = ".." }

[[bin]]
name = "parse_policy"
path = "fuzz_targets/parse_policy.rs"
test = false
doc = false
bench = false

[[bin]]
name = "compile_policy"
path = "fuzz_targets/compile_policy.rs"
test = false
doc = false
bench = false

# Isolate from the parent workspace (cargo-fuzz convention).
[workspace]
