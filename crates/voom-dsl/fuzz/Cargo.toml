[package]
name = "voom-dsl-fuzz"
version = "0.0.0"
publish = false
edition = "2021"

[package.metadata]
cargo-fuzz = true

[dependencies]
libfuzzer-sys = "0.4"
voom-dsl = { path = ".." }

[[bin]]
name = "parse_policy"
path = "fuzz_targets/parse_policy.rs"
test = false
doc = false
bench = false

[[bin]]
name = "compile_policy"
path = "fuzz_targets/compile_policy.rs"
test = false
doc = false
bench = false

# Required by cargo-fuzz: prevent this crate from being picked up as a
# workspace member. Combined with the workspace `exclude` entry below,
# this isolates the fuzz crate from the stable workspace build.
[workspace]
