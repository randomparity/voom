# SonarCloud project configuration
sonar.organization=randomparity
sonar.projectKey=randomparity_voom
sonar.projectName=VOOM

# Source and test roots share the same directories; SonarCloud uses
# test.inclusions to separate them (and auto-excludes matched paths
# from source analysis).
sonar.sources=crates,plugins,wasm-plugins
sonar.tests=crates,plugins,wasm-plugins
sonar.test.inclusions=**/tests/**

# Exclude build artifacts, vendored/generated files, and non-source assets
sonar.exclusions=**/target/**,\
  **/wit/**,**/*.wit,\
  **/snapshots/**,\
  **/Cargo.lock,\
  **/__pycache__/**,\
  **/*.pyc,\
  **/node_modules/**,\
  **/.venv/**

# Encoding
sonar.sourceEncoding=UTF-8
