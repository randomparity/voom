name: VOOM CodeQL config

# Disable rules that produce only false positives for this codebase.
#
# rust/cleartext-logging (CWE-312): VOOM is a local-only video library
# manager. The values this rule flags are UUIDs returned by parse_uuid()
# — local SQLite row identifiers for media files. They are not auth
# tokens, session tokens, credentials, or PII, and there is no
# sensitive-data sink to protect. All current alerts under this rule
# are false positives produced by taint flow from parse_uuid() into
# println!/eprintln!/tracing sinks.
query-filters:
  - exclude:
      id: rust/cleartext-logging
