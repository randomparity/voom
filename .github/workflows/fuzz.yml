name: Fuzz

on:
  schedule:
    # Mondays at 06:00 UTC. Runs the weekly fuzz sweep before US/EU work hours.
    - cron: '0 6 * * 1'
  workflow_dispatch: {}

permissions:
  contents: read

env:
  FUZZ_SECONDS: 600

jobs:
  fuzz:
    name: Fuzz ${{ matrix.target }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        target: [parse_policy, compile_policy]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Install nightly toolchain
        uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6  # v1
        with:
          toolchain: nightly

      - name: Install cargo-fuzz with stable Rust
        # cargo-fuzz's pinned old rustix won't compile on modern nightly,
        # so install cargo-fuzz itself with stable. The fuzz harness still
        # builds and runs with nightly via `cargo +nightly fuzz`.
        run: |
          rustup toolchain install stable --profile minimal --no-self-update
          cargo +stable install cargo-fuzz --locked

      - name: Restore fuzz corpus
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: crates/voom-dsl/fuzz/corpus/${{ matrix.target }}
          # run_id makes the primary key unique per run so each run writes a
          # fresh corpus snapshot; restore-keys pulls the most recent prior one.
          key: fuzz-corpus-${{ matrix.target }}-${{ github.run_id }}
          restore-keys: |
            fuzz-corpus-${{ matrix.target }}-

      - name: Seed corpus from committed inputs
        run: |
          seeds=crates/voom-dsl/fuzz/seeds/${{ matrix.target }}
          test -d "$seeds" || { echo "missing seeds dir: $seeds" >&2; exit 1; }
          mkdir -p crates/voom-dsl/fuzz/corpus/${{ matrix.target }}
          cp -n "$seeds"/*.voom crates/voom-dsl/fuzz/corpus/${{ matrix.target }}/

      - name: Run fuzz target
        working-directory: crates/voom-dsl/fuzz
        run: cargo +nightly fuzz run ${{ matrix.target }} -- -max_total_time=${{ env.FUZZ_SECONDS }}

      - name: Upload crash artifacts on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: fuzz-crashes-${{ matrix.target }}
          path: crates/voom-dsl/fuzz/artifacts/${{ matrix.target }}/
          if-no-files-found: ignore
          retention-days: 30
