name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

env:
  CARGO_INCREMENTAL: 0

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 0
      - uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6  # v1.16.1
      - name: Validate release version
        shell: bash
        run: |
          set -euo pipefail

          tag="${GITHUB_REF_NAME}"
          if [[ ! "${tag}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Release tags must use vMAJOR.MINOR.PATCH, got: ${tag}" >&2
            exit 1
          fi

          package_version="$(cargo metadata --no-deps --format-version=1 \
            | jq -r '.packages[] | select(.name == "voom-cli") | .version')"
          tag_version="${tag#v}"

          if [[ "${package_version}" != "${tag_version}" ]]; then
            echo "Tag ${tag} does not match voom-cli package version ${package_version}" >&2
            exit 1
          fi
      - run: cargo build --release --bin voom
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: voom-linux-x86_64
          path: target/release/voom

  release:
    name: Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: voom-linux-x86_64
      - uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda  # v3.0.0
        with:
          generate_release_notes: true
          files: voom
