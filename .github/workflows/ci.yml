name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_INCREMENTAL: 0
  RUSTFLAGS: "-D warnings"

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false
      - uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6  # v1.16.1
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace -- -D warnings
      - run: cargo clippy -p voom-kernel --features wasm -- -D warnings

  test:
    name: Test
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false
      - uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6  # v1.16.1
        with:
          target: wasm32-wasip2
      - run: sudo apt-get update && sudo apt-get install -y --no-install-recommends ffmpeg
      - name: Build WASM streaming test fixture
        run: bash crates/voom-kernel/tests/fixtures/wasm-streaming-test-plugin/build.sh
      - run: cargo build --workspace
      - run: cargo test --workspace
      - run: cargo run -q -- policy test docs/examples/tests
      - run: cargo test -p voom-cli --features functional -- --test-threads=4 test_init test_doctor test_policy test_config test_status test_jobs test_plugin test_verify
      - run: cargo test -p voom-cli --features functional -- --test-threads=4 test_process crash_recovery normal_backup_not_treated_as_orphan
      - run: cargo test -p voom-cli --features functional --test plugin_stats_e2e -- --test-threads=1

  test-wasm:
    name: Test (WASM feature)
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false
      - uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6  # v1.16.1
        with:
          target: wasm32-wasip2
      - name: Build WASM streaming test fixture
        run: bash crates/voom-kernel/tests/fixtures/wasm-streaming-test-plugin/build.sh
      - run: cargo build -p voom-kernel --features wasm
      - run: cargo test -p voom-kernel --features wasm

  test-vmaf-integration:
    name: Test (VMAF integration)
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false
      - uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6  # v1.16.1
      - run: sudo apt-get update
      - run: sudo apt-get install -y ffmpeg
      - run: cargo test -p voom-cli --features integration --test vmaf_e2e

  deny:
    name: Dependency audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false
      - uses: EmbarkStudios/cargo-deny-action@6c8f9facfa5047ec02d8485b6bf52b587b7777d1  # v2.0.18
